name: Build Mac & Windows

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install CPU-only PyTorch
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - name: Install dependencies
        run: pip install pyinstaller opencv-python numpy pillow PySide6 ultralytics sahi
      - name: Build (Apple Silicon)
        run: python build_helper.py
      - name: Zip app
        run: cd dist && zip -r ../StarTrailCleanR-Mac-AppleSilicon.zip StarTrailCleanR.app
      - uses: actions/upload-artifact@v4
        with:
          name: StarTrailCleanR-Mac
          path: StarTrailCleanR-Mac-AppleSilicon.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install CPU-only PyTorch
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - name: Install dependencies
        run: pip install pyinstaller opencv-python numpy pillow PySide6 ultralytics sahi
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
        shell: pwsh
      - name: Build (PyInstaller)
        run: python build_helper.py
      - name: Read version
        id: version
        run: echo "version=$(Get-Content version.txt)" >> $env:GITHUB_OUTPUT
        shell: pwsh
      - name: Build installer (Inno Setup)
        run: iscc /DAppVersion=${{ steps.version.outputs.version }} installer\StarTrailCleanR.iss
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: StarTrailCleanR-Windows
          path: installer/StarTrailCleanRSetup-v*.exe

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            StarTrailCleanR-Mac/StarTrailCleanR-Mac-AppleSilicon.zip
            StarTrailCleanR-Windows/StarTrailCleanRSetup-v*.exe
          body: |
            ## Star Trail CleanR ${{ github.ref_name }}

            ### Download
            - **Mac (Apple Silicon M1/M2/M3/M4)**: StarTrailCleanR-Mac-AppleSilicon.zip, unzip and run StarTrailCleanR.app (right-click then Open first time)
            - **Windows**: StarTrailCleanRSetup-v*.exe, double-click to install. If Windows SmartScreen warns about an unrecognized publisher, click "More info" then "Run anyway".
