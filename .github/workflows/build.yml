name: Build Mac, Windows, Linux

on:
  push:
    tags:
      - 'v*'
  # Manual trigger from the Actions UI for dry-runs (e.g., validating a new
  # build job before its first real release tag). Builds the binaries; the
  # `release` job below skips when the workflow isn't running off a tag, so
  # no GitHub release is created on a manual dispatch.
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install CPU-only PyTorch
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - name: Install dependencies
        run: pip install pyinstaller opencv-python 'numpy<2' pillow PySide6 ultralytics sahi nvidia-ml-py sentry-sdk tifffile scikit-image
      - name: Bake Sentry DSN
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: python -c "import os; open('_sentry_config.py','w').write('DSN = ' + repr(os.environ.get('SENTRY_DSN','')))"
      - name: Build (Apple Silicon)
        run: python build_helper.py
      - name: Smoke test bundled app
        # Runs the bundled worker on a synthetic frame. Catches bugs that
        # don't reproduce in dev: stripped torchvision MPS ops, missing
        # PyInstaller hidden imports, library version mismatches, etc.
        # If this fails, the bad bundle never reaches users.
        run: python scripts/smoke_built_bundle.py
      - name: Zip app
        run: cd dist && zip -r ../StarTrailCleanR-Mac-AppleSilicon.zip StarTrailCleanR.app
      - uses: actions/upload-artifact@v4
        with:
          name: StarTrailCleanR-Mac
          path: StarTrailCleanR-Mac-AppleSilicon.zip

  build-mac-intel:
    # Intel Mac build on GitHub's x86_64 macOS runner.
    # GitHub has announced Intel Mac runners retire in Fall 2027. This job
    # runs through at least that point; after retirement we either drop
    # Intel Mac releases or move to a different host.
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install CPU-only PyTorch
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - name: Install dependencies
        run: pip install pyinstaller opencv-python 'numpy<2' pillow PySide6 ultralytics sahi nvidia-ml-py sentry-sdk tifffile scikit-image
      - name: Bake Sentry DSN
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: python -c "import os; open('_sentry_config.py','w').write('DSN = ' + repr(os.environ.get('SENTRY_DSN','')))"
      - name: Build (Intel)
        run: python build_helper.py
      - name: Smoke test bundled app
        run: python scripts/smoke_built_bundle.py
      - name: Zip app
        run: cd dist && zip -r ../StarTrailCleanR-Mac-Intel.zip StarTrailCleanR.app
      - uses: actions/upload-artifact@v4
        with:
          name: StarTrailCleanR-Mac-Intel
          path: StarTrailCleanR-Mac-Intel.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install CPU-only PyTorch
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - name: Install dependencies
        run: pip install pyinstaller opencv-python 'numpy<2' pillow PySide6 ultralytics sahi nvidia-ml-py sentry-sdk tifffile scikit-image
      - name: Bake Sentry DSN
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: python -c "import os; open('_sentry_config.py','w').write('DSN = ' + repr(os.environ.get('SENTRY_DSN','')))"
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
        shell: pwsh
      - name: Build (PyInstaller)
        run: python build_helper.py
      - name: Smoke test bundled app
        run: python scripts/smoke_built_bundle.py
        shell: pwsh
      - name: Read version
        id: version
        run: echo "version=$(Get-Content version.txt)" >> $env:GITHUB_OUTPUT
        shell: pwsh
      - name: Build installer (Inno Setup)
        run: iscc /DAppVersion=${{ steps.version.outputs.version }} installer\StarTrailCleanR.iss
        shell: pwsh
      - name: Wrap installer in zip
        # Edge SmartScreen quarantines unsigned .exe downloads in a "Microsoft
        # Defender SmartScreen couldn't verify..." dialog whose "Keep" option
        # is buried in a near-invisible dropdown next to the Delete button.
        # Wrapping the installer in a zip sidesteps that gate. NoCompression
        # because the .exe is already LZMA2-compressed; Deflate would just burn CI time.
        run: Compress-Archive -Path installer\StarTrailCleanRSetup.exe -DestinationPath installer\StarTrailCleanRSetup.zip -CompressionLevel NoCompression
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: StarTrailCleanR-Windows
          path: installer/StarTrailCleanRSetup.zip

  build-linux:
    # Ubuntu 22.04 (glibc 2.35) instead of ubuntu-latest so the binary runs
    # on Ubuntu 22.04+, Debian 12+, Fedora 36+, and other 2022-or-newer
    # distros. ubuntu-latest currently pins to 24.04 (glibc 2.39) which would
    # shut out users still on older LTS releases.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Qt system libraries
        # PySide6 wheels include Qt's own .so files but Qt loads a handful of
        # standard X11/Wayland system libraries at runtime. Ubuntu's minimal
        # CI image doesn't include them by default. Without these the bundle
        # builds fine but the frozen app crashes on launch with
        # "Could not load the Qt platform plugin 'xcb'".
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-sync1 libxcb-xfixes0 libxcb-xinerama0 libegl1 \
            libfontconfig1 libdbus-1-3
      - name: Install CPU-only PyTorch
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - name: Install dependencies
        run: pip install pyinstaller opencv-python 'numpy<2' pillow PySide6 ultralytics sahi nvidia-ml-py sentry-sdk tifffile scikit-image
      - name: Bake Sentry DSN
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: python -c "import os; open('_sentry_config.py','w').write('DSN = ' + repr(os.environ.get('SENTRY_DSN','')))"
      - name: Build (PyInstaller)
        run: python build_helper.py
      - name: Smoke test bundled app
        run: python scripts/smoke_built_bundle.py
      - name: Tar bundle
        # tar.gz keeps Unix file permissions (the binary's exec bit). zip
        # would strip them and the user would get "permission denied" trying
        # to launch the binary. .tar.gz is the Linux norm anyway.
        run: cd dist && tar -czf ../StarTrailCleanR-Linux-x86_64.tar.gz StarTrailCleanR
      - uses: actions/upload-artifact@v4
        with:
          name: StarTrailCleanR-Linux
          path: StarTrailCleanR-Linux-x86_64.tar.gz

  # build-windows-nvidia removed 2026-04-23 in the v1.5-beta re-ship.
  # The CUDA-enabled installer came out 3.13 GB, over GitHub's 2 GB per-file
  # release asset cap. Parked as todo #1 pending a size fix (strip more CUDA
  # libraries with a Windows NVIDIA tester, host externally, or switch to
  # torch-directml). When re-adding this job, also restore its tests in
  # tests/test_installer_config.py and its URL in reference_stable_download_urls.md.

  release:
    needs: [build-mac, build-mac-intel, build-windows, build-linux]
    runs-on: ubuntu-latest
    # Skip the release-creation step on manual dry-runs. Only fires when the
    # workflow was triggered by a `v*` tag push.
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            StarTrailCleanR-Mac/StarTrailCleanR-Mac-AppleSilicon.zip
            StarTrailCleanR-Mac-Intel/StarTrailCleanR-Mac-Intel.zip
            StarTrailCleanR-Windows/StarTrailCleanRSetup.zip
            StarTrailCleanR-Linux/StarTrailCleanR-Linux-x86_64.tar.gz
          body: |
            ## Star Trail CleanR ${{ github.ref_name }}

            ### Download

            **Mac**
            - **Apple Silicon (M1/M2/M3/M4)**: StarTrailCleanR-Mac-AppleSilicon.zip, unzip and run StarTrailCleanR.app (right-click then Open first time).
            - **Intel (older Macs)**: StarTrailCleanR-Mac-Intel.zip, same steps. Slower than Apple Silicon (no built-in GPU acceleration) but functional.

            **Windows**
            - **Standard**: StarTrailCleanRSetup.zip. Right-click the downloaded zip and choose "Extract All...", then double-click StarTrailCleanRSetup.exe inside the extracted folder. If Windows shows a blue "Windows protected your PC" warning, click "More info" then "Run anyway".

            **Linux** (x86_64, Ubuntu 22.04+ / Debian 12+ / Fedora 36+ or newer)
            - StarTrailCleanR-Linux-x86_64.tar.gz. Extract anywhere (`tar -xzf StarTrailCleanR-Linux-x86_64.tar.gz`), then run `./StarTrailCleanR/StarTrailCleanR` from the extracted folder. First Linux release; please report any issues.
